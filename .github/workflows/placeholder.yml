name: Validate Sheepfold

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - editsByClaude

permissions:
  contents: read

jobs:
  shell-and-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate OpenWrt shell syntax
        shell: bash
        run: |
          set -euo pipefail
          test -x install.sh
          sh -n install.sh
          package_root="package/luci-app-sheepfold-family-internet-control/root"
          find "$package_root/usr/libexec/sheepfold" \
            -type f -print0 | xargs -0 -n1 sh -n
          find "$package_root/usr/share/sheepfold/router-profiles" \
            -type f \( -name apply-mode -o -name install -o -name uninstall \) \
            -print0 | xargs -0 -n1 sh -n
          find "$package_root/etc/hotplug.d" -type f -print0 | xargs -0 -n1 sh -n
          sh -n "$package_root/www/cgi-bin/sheepfold-api"
          sh -n "$package_root/www/.well-known/sheepfold.json.sh"
          sh -n "$package_root/etc/init.d/sheepfold"

      - name: Validate optional ucode mDNS collector
        shell: bash
        run: |
          set -euo pipefail
          root="package/luci-app-sheepfold-family-internet-control/root"
          wrapper="$root/usr/libexec/sheepfold/sheepfold-device-mdns"
          source="$root/usr/share/sheepfold/device-mdns.uc"
          grep -q '^#!/bin/sh$' "$wrapper"
          grep -q 'ucode "\$UCODE_SOURCE"' "$wrapper"
          grep -q 'ubus.call("umdns", "browse"' "$source"
          grep -q 'ubus.call("umdns", "hosts"' "$source"

      - name: Validate runtime hardening invariants
        shell: bash
        run: |
          set -euo pipefail
          package_root="package/luci-app-sheepfold-family-internet-control/root"
          sh "$package_root/usr/libexec/sheepfold/sheepfold-runtime-hardening" "$package_root"

      - name: Test device classification safety
        shell: bash
        run: |
          set -euo pipefail
          classifier="package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-classifier"
          signal_file="$(mktemp)"
          trap 'rm -f "$signal_file"' EXIT

          openwrt="$(sh "$classifier" "OpenWrt" "" "" "" "00:11:22:33:44:55")"
          test "$(printf '%s' "$openwrt" | cut -f1)" = "network"
          test -z "$(printf '%s' "$openwrt" | cut -f3)"
          test "$(printf '%s' "$openwrt" | cut -f8)" = "1"

          mixed="$(sh "$classifier" "OpenWrt alarm" "8123,445" "" "" "00:11:22:33:44:55")"
          test "$(printf '%s' "$mixed" | cut -f1)" = "network"
          test "$(printf '%s' "$mixed" | cut -f8)" = "1"

          speaker="$(sh "$classifier" "Yandex Station" "" "" "" "00:11:22:33:44:55")"
          test "$(printf '%s' "$speaker" | cut -f1)" = "speaker"
          test "$(printf '%s' "$speaker" | cut -f5)" = "50"
          test "$(printf '%s' "$speaker" | cut -f7)" = "1"

          printf 'vendor_class\tYandex Station IoT\nrequested_options\t1,3,6,15,51\n' > "$signal_file"
          confirmed_speaker="$(sh "$classifier" "Yandex Station" "" "" "$signal_file" "00:11:22:33:44:55")"
          test "$(printf '%s' "$confirmed_speaker" | cut -f5)" -ge 80
          test "$(printf '%s' "$confirmed_speaker" | cut -f7)" -ge 2
          test "$(printf '%s' "$confirmed_speaker" | cut -f8)" = "0"

          mdns_speaker="$(sh "$classifier" "Yandex Station" "" "" "" "00:11:22:33:44:55" "_googlecast._tcp,_raop._tcp")"
          test "$(printf '%s' "$mdns_speaker" | cut -f1)" = "speaker"
          test "$(printf '%s' "$mdns_speaker" | cut -f5)" -ge 80
          test "$(printf '%s' "$mdns_speaker" | cut -f7)" -ge 2

          unknown_cast="$(sh "$classifier" "unknown-device" "" "" "" "00:11:22:33:44:55" "_googlecast._tcp")"
          test "$(printf '%s' "$unknown_cast" | cut -f1)" = "tv"
          test "$(printf '%s' "$unknown_cast" | cut -f8)" = "1"

          lamp="$(sh "$classifier" "Yeelight Lamp" "" "Yeelight Kitchen Lamp" "" "00:11:22:33:44:55")"
          test "$(printf '%s' "$lamp" | cut -f1)" = "smart_home"
          test "$(printf '%s' "$lamp" | cut -f5)" -ge 80
          test "$(printf '%s' "$lamp" | cut -f7)" -ge 2

          printf 'vendor_class\tMSFT 5.0\nrequested_options\t1,3,6,15,31,33,43,44,46,47,119,121,249,252\n' > "$signal_file"
          spoofed_lamp="$(sh "$classifier" "Yeelight Lamp" "" "" "$signal_file" "00:11:22:33:44:55")"
          test "$(printf '%s' "$spoofed_lamp" | cut -f8)" = "1"

      - name: Validate Android XML
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          for project in (Path('android'), Path('android-child')):
              for xml_file in project.rglob('*.xml'):
                  ET.parse(xml_file)
                  print(xml_file)
          PY

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: node --test tests/*.test.mjs

  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: android
            task: assembleDebug
            kind: parent
            apk: android/app/build/outputs/apk/debug/app-debug.apk
          - project: android-child
            task: assembleDebug
            kind: child
            apk: android-child/app/build/outputs/apk/debug/app-debug.apk
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./${{ matrix.project }}/gradlew -p "${{ matrix.project }}" ${{ matrix.task }} --stacktrace

      - name: Verify product boundary inside APK
        run: python3 scripts/verify-android-variant.py --kind "${{ matrix.kind }}" "${{ matrix.apk }}"
