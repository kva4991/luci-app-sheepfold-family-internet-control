name: Apply device presence UI update

on:
  push:
    branches:
      - editsByClaude
    paths:
      - .github/workflows/tmp-device-presence-edit.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: editsByClaude
          fetch-depth: 0

      - name: Apply source changes
        shell: bash
        run: |
          sed -i 's/;;","$/;;",/' scripts/tmp_apply_device_presence_ui.py
          python3 -m py_compile scripts/tmp_apply_device_presence_ui.py
          python3 scripts/tmp_apply_device_presence_ui.py

      - name: Validate changed sources
        shell: bash
        run: |
          OVERVIEW='package/luci-app-sheepfold-family-internet-control/htdocs/luci-static/resources/view/sheepfold/overview.js'
          CLASSIFIER='package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-classifier'
          DETECTOR='package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-detector'
          RECLASSIFY='package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-reclassify'
          PRESENCE='package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-presence'

          node --check "$OVERVIEW"
          sh -n "$CLASSIFIER"
          sh -n "$DETECTOR"
          sh -n "$RECLASSIFY"
          sh -n "$PRESENCE"

          result="$($CLASSIFIER 'Office printer' '631,9100' '' '' '00:11:22:33:44:55' '_ipp._tcp')"
          test "$(printf '%s' "$result" | awk -F '\t' '{print $3}')" = 'Без ограничений'
          test "$(printf '%s' "$result" | awk -F '\t' '{print $8}')" = '0'

      - name: Commit completed update
        shell: bash
        run: |
          rm -f scripts/tmp_apply_device_presence_ui.py
          rm -f .github/workflows/tmp-device-presence-edit.yml
          git config user.name 'Sheepfold automation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Show device presence and detection details in LuCI'
          git push origin HEAD:editsByClaude

# Updating this file intentionally triggers the one-shot workflow after it exists on the branch.
