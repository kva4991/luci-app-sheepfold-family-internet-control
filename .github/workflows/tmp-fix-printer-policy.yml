name: Apply printer detection policy update

on:
  push:
    branches:
      - editsByClaude
    paths:
      - .github/workflows/tmp-fix-printer-policy.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: editsByClaude
          fetch-depth: 0

      - name: Patch printer policy and tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')
          classifier_path = root / 'package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-classifier'
          detector_path = root / 'package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-detector'
          safety_test_path = root / 'tests/deviceDetectorSafety.test.mjs'
          ui_test_path = root / 'tests/deviceDetectionUi.test.mjs'

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          classifier = classifier_path.read_text(encoding='utf-8')
          classifier = replace_once(classifier, 'POLICY_VERSION="2"', 'POLICY_VERSION="3"', 'classifier policy version')
          classifier = replace_once(
              classifier,
              'server|engineering|camera|smart_home|vacuum|speaker) return 0 ;;',
              'server|engineering|camera|smart_home|vacuum|speaker|printer) return 0 ;;',
              'printer eligible type',
          )
          classifier = replace_once(
              classifier,
              'network|phone|tablet|computer|tv|console|printer) return 0 ;;',
              'network|phone|tablet|computer|tv|console) return 0 ;;',
              'printer interactive type',
          )
          classifier = replace_once(
              classifier,
              '''        REASON="printer mDNS service"
                  HARD_DENY=1
                  add_evidence mdns 0
          ''',
              '''        REASON="printer mDNS service"
                  # Принтерный сервис подтверждает тип, но сам по себе не означает
                  # пользовательское устройство, которому запрещено автодоверие.
                  add_evidence mdns 45
          ''',
              'printer mDNS policy',
          )
          classifier = replace_once(
              classifier,
              '''        REASON="printer service is open"
                  add_evidence ports 0
                  HARD_DENY=1
          ''',
              '''        REASON="printer service is open"
                  # IPP/JetDirect — независимое подтверждение принтера, не жёсткий запрет.
                  add_evidence ports 45
          ''',
              'printer port policy',
          )
          classifier_path.write_text(classifier, encoding='utf-8')

          detector = detector_path.read_text(encoding='utf-8')
          detector = replace_once(detector, 'POLICY_VERSION="2"', 'POLICY_VERSION="3"', 'detector policy version')
          detector_path.write_text(detector, encoding='utf-8')

          safety = safety_test_path.read_text(encoding='utf-8')
          safety = replace_once(
              safety,
              '''  it('mDNS принтера всегда запрещает автоматическое доверие', () => {
              const device = classify({
                name: 'office-device',
                mdnsServices: '_ipp._tcp,_printer._tcp',
              });

              assert.equal(device.type, 'printer');
              assert.equal(device.hardDeny, true);
              assert.equal(isAutoAssignable(device), false);
            });
          ''',
              '''  it('один mDNS-признак принтера не даёт доверие, но и не включает жёсткий запрет', () => {
              const device = classify({
                name: 'office-device',
                mdnsServices: '_ipp._tcp,_printer._tcp',
              });

              assert.equal(device.type, 'printer');
              assert.equal(device.hardDeny, false);
              assert.equal(device.evidenceCount, 1);
              assert.equal(isAutoAssignable(device), false);
            });

            it('два независимых принтерных признака разрешают безопасное автодоверие', () => {
              const device = classify({
                name: 'Office printer',
                ports: '631,9100',
                mdnsServices: '_ipp._tcp,_printer._tcp',
              });

              assert.equal(device.type, 'printer');
              assert.equal(device.hardDeny, false);
              assert.ok(device.evidenceCount >= 2);
              assert.equal(isAutoAssignable(device), true);
            });
          ''',
              'printer safety test',
          )
          safety = replace_once(
              safety,
              '''    assert.match(source, /manual_device_type_locked/);
              assert.doesNotMatch(source, /delete[^\\n]*\\.group/);
          ''',
              '''    assert.match(source, /manual_device_type=0/);
              assert.match(source, /delete[^\\n]*\\.device_type/);
              assert.doesNotMatch(source, /delete[^\\n]*\\.group/);
          ''',
              'reclassification safety test',
          )
          safety_test_path.write_text(safety, encoding='utf-8')

          ui_test = ui_test_path.read_text(encoding='utf-8')
          ui_test = replace_once(
              ui_test,
              '''    assert.match(source, /балл автодоверия/);
              assert.match(source, /автоматическое доверие запрещено/);
              assert.match(source, /DHCP-отпечаток/);
              assert.match(source, /mDNS\\/DNS-SD/);
              assert.match(source, /device-reclassify/);
              assert.match(source, /manual_device_type/);
          ''',
              '''    assert.match(source, /Балл автодоверия/);
              assert.match(source, /Жёсткий запрет/);
              assert.match(source, /Источники доказательств/);
              assert.match(source, /Производитель MAC/);
              assert.match(source, /Обнаруженные mDNS-сервисы/);
              assert.match(source, /sf-device-detection-modal/);
              assert.match(source, /device-reclassify/);
              assert.match(source, /manual_device_type/);
              assert.doesNotMatch(source, /nameCell\\.appendChild\\(E\\('small', \\{ 'class': 'sf-detection-evidence'/);
          ''',
              'device detection modal UI test',
          )
          ui_test = replace_once(
              ui_test,
              '''    assert.match(source, /\\.sf-detection-evidence/);
              assert.match(source, /\\.sf-device-reclassify/);
          ''',
              '''    assert.match(source, /\\.sf-device-detection-modal/);
              assert.match(source, /\\.sf-device-detection-grid/);
              assert.match(source, /\\.sf-device-reclassify/);
          ''',
              'device detection CSS test',
          )
          ui_test_path.write_text(ui_test, encoding='utf-8')
          PY

      - name: Validate printer policy and LuCI changes
        shell: bash
        run: |
          set -euo pipefail
          classifier='package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-classifier'
          detector='package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-detector'
          reclassify='package/luci-app-sheepfold-family-internet-control/root/usr/libexec/sheepfold/sheepfold-device-reclassify'
          overview='package/luci-app-sheepfold-family-internet-control/htdocs/luci-static/resources/view/sheepfold/overview-personal.js'

          sh -n "$classifier"
          sh -n "$detector"
          sh -n "$reclassify"
          node --check "$overview"
          node --test tests/deviceDetectorSafety.test.mjs tests/deviceDetectionUi.test.mjs tests/devicePresence.test.mjs

      - name: Commit completed update
        shell: bash
        run: |
          rm -f .github/workflows/tmp-fix-printer-policy.yml
          git config user.name 'Sheepfold automation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Fix printer trust policy and device settings diagnostics'
          git push origin HEAD:editsByClaude
